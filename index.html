<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Rock Paper Scissors</title>
</head>
<body>

  <script>

    function getComputerChoice () {
      const random = Math.random();

      if (random < 0.33) {
        console.log('pizza');
        return 'pizza';
      } else if (random < 0.67) {
        console.log('sushi');
        return 'sushi';
      } else  {
        console.log('cake');
        return 'cake';
      }
    }

     getComputerChoice();
    
  </script>
  
</body>
</html>
